# ****************************************************************************
# Waybeam-specific targets (fork-local)
# ****************************************************************************
#
# These envs are additive on top of upstream ExpressLRS/Backpack. They do not
# replace or mutate stock targets; rebases on upstream should leave this file
# untouched.
#
# ESP32C3_SuperMini_TX_Backpack_Host:
#   Stock TX-Backpack firmware plus a USB-CDC host channel for an external
#   host (Android, Radxa, x86) to observe/inject ESP-NOW traffic while the
#   ELRS TX module runs the normal CRSF/MSP link on UART1 (GPIO20=RX,
#   GPIO21=TX, 460800 8N1).

[env:ESP32C3_SuperMini_TX_Backpack_Host]
extends = env:ESP32C3_TX_Backpack_via_UART
# ARDUINO_USB_CDC_ON_BOOT=1 firmware owns the USB interface at 460800 after
# boot, which can confuse esptool's mid-flash baud switch on re-flash. Pin
# upload speed to 115200 so no switch is needed. If re-flash fails anyway,
# put the chip in ROM bootloader (hold BOOT, replug USB) and retry.
upload_speed = 115200
build_flags =
	${env:ESP32C3_TX_Backpack_via_UART.build_flags}
	-D HOST_USB_CDC=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
